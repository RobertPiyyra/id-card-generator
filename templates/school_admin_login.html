<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="csrf-token" content="{{ csrf_token() }}">
    <title>School Admin Login - Noor Graphics</title>
    <link rel="icon" href="data:,">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Poppins:wght@300;400;500;600;700&display=swap');

        :root {
            --primary: #0066ff;
            --primary-gradient: linear-gradient(135deg, #0066ff 0%, #0052cc 100%);
            --accent: #ff4757;
            --accent-gradient: linear-gradient(135deg, #ff4757 0%, #ff3838 100%);
            --secondary: #00d2ff;
            
            --bg-light: linear-gradient(135deg, #f8faff 0%, #edf2ff 100%);
            --bg-dark: linear-gradient(135deg, #0f0f23 0%, #1a1a2e 100%);
            
            --card-light: rgba(255, 255, 255, 0.75);
            --card-dark: rgba(30, 30, 50, 0.75);
            
            --text-light: #1a1a1a;
            --text-dark: #f8f9fa;
            
            --border-light: rgba(255, 255, 255, 0.4);
            --border-dark: rgba(255, 255, 255, 0.1);
            
            --shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            --shadow-dark: 0 20px 40px rgba(0, 0, 0, 0.3);
            
            --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg-light);
            color: var(--text-light);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
            position: relative;
            transition: var(--transition);
        }

        body.dark {
            background: var(--bg-dark);
            color: var(--text-dark);
        }

        /* Radial Background Glow Orbs */
        .radial-glow-1 {
            position: absolute;
            top: -10%;
            left: -10%;
            width: 50vw;
            height: 50vw;
            background: radial-gradient(circle, rgba(0, 102, 255, 0.15) 0%, transparent 70%);
            z-index: -2;
            pointer-events: none;
            animation: pulseGlow 10s infinite alternate;
        }

        .radial-glow-2 {
            position: absolute;
            bottom: -10%;
            right: -10%;
            width: 50vw;
            height: 50vw;
            background: radial-gradient(circle, rgba(255, 71, 87, 0.1) 0%, transparent 70%);
            z-index: -2;
            pointer-events: none;
            animation: pulseGlow 12s infinite alternate-reverse;
        }

        @keyframes pulseGlow {
            0% { transform: scale(1) translate(0, 0); }
            100% { transform: scale(1.2) translate(5%, 5%); }
        }

        /* Floating bubbles */
        .bg-bubbles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .bg-bubbles li {
            position: absolute;
            list-style: none;
            display: block;
            width: 40px;
            height: 40px;
            background-color: rgba(0, 102, 255, 0.08);
            bottom: -160px;
            border-radius: 50%;
            animation: floatBubbles 25s infinite linear;
        }

        .bg-bubbles li:nth-child(1) { left: 10%; width: 80px; height: 80px; }
        .bg-bubbles li:nth-child(2) { left: 20%; animation-delay: 2s; animation-duration: 17s; width: 60px; height: 60px; }
        .bg-bubbles li:nth-child(3) { left: 25%; animation-delay: 4s; width: 100px; height: 100px; }
        .bg-bubbles li:nth-child(4) { left: 40%; animation-delay: 0s; animation-duration: 22s; width: 140px; height: 140px; }
        .bg-bubbles li:nth-child(5) { left: 70%; animation-delay: 3s; width: 80px; height: 80px; }
        .bg-bubbles li:nth-child(6) { left: 80%; animation-delay: 2s; width: 110px; height: 110px; }

        body.dark .bg-bubbles li {
            background-color: rgba(255, 255, 255, 0.03);
        }

        @keyframes floatBubbles {
            0% { transform: translateY(0) rotate(0deg); opacity: 0.8; }
            100% { transform: translateY(-1200px) rotate(720deg); opacity: 0; }
        }

        /* Glass Login Box */
        .login-card {
            background: var(--card-light);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-light);
            border-radius: 24px;
            padding: 45px 35px;
            width: 100%;
            max-width: 420px;
            box-shadow: var(--shadow);
            transition: var(--transition);
            animation: slideUp 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            z-index: 10;
        }

        body.dark .login-card {
            background: var(--card-dark);
            border: 1px solid var(--border-dark);
            box-shadow: var(--shadow-dark);
        }

        .login-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.15);
        }

        body.dark .login-card:hover {
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4);
        }

        .login-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 6px;
            background: var(--primary-gradient);
            border-radius: 24px 24px 0 0;
        }

        .brand-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .brand-logo {
            width: 70px;
            height: 70px;
            background: var(--primary-gradient);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
            box-shadow: 0 10px 20px rgba(0, 102, 255, 0.3);
            color: white;
            font-size: 2rem;
            animation: pulseLogo 3s infinite alternate;
        }

        @keyframes pulseLogo {
            0% { transform: scale(1); }
            100% { transform: scale(1.05); }
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 1.8rem;
            font-weight: 800;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .brand-subtitle {
            font-size: 0.95rem;
            opacity: 0.7;
            margin-top: 5px;
        }

        /* Form styling */
        .form-group {
            margin-bottom: 20px;
            position: relative;
        }

        label {
            display: block;
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        label i {
            color: var(--primary);
        }

        .input-group {
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid rgba(0, 102, 255, 0.1);
            background: rgba(255, 255, 255, 0.5);
            transition: var(--transition);
        }

        body.dark .input-group {
            background: rgba(0, 0, 0, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.05);
        }

        .input-group-text {
            background: transparent;
            border: none;
            color: var(--primary);
            font-size: 1rem;
            padding-left: 15px;
        }

        .form-control {
            border: none;
            background: transparent;
            color: inherit;
            padding: 13px 15px;
            font-family: inherit;
            font-size: 0.95rem;
            border-radius: 0;
        }

        .form-control:focus {
            outline: none;
            box-shadow: none;
            background: transparent;
            color: inherit;
        }

        .input-group:focus-within {
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.8);
            box-shadow: 0 0 0 4px rgba(0, 102, 255, 0.15);
            transform: translateY(-2px);
        }

        body.dark .input-group:focus-within {
            background: rgba(0, 0, 0, 0.4);
            box-shadow: 0 0 0 4px rgba(0, 102, 255, 0.3);
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            background: var(--primary-gradient);
            color: white;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: 0 10px 20px rgba(0, 102, 255, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            position: relative;
            overflow: hidden;
            text-decoration: none;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.6s ease;
        }

        .btn:hover::before {
            left: 100%;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 25px rgba(0, 102, 255, 0.4);
            color: white;
        }

        .back-link {
            text-align: center;
            margin-top: 25px;
        }

        .back-link a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: var(--transition);
        }

        .back-link a:hover {
            transform: translateX(-5px);
            opacity: 0.8;
        }

        /* Theme Toggle */
        .theme-toggle {
            position: fixed;
            top: 25px;
            right: 25px;
            background: var(--primary-gradient);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 50%;
            cursor: pointer;
            transition: var(--transition);
            z-index: 1000;
            font-size: 1.3rem;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 20px rgba(0, 102, 255, 0.2);
        }

        .theme-toggle:hover {
            transform: translateY(-3px) rotate(15deg);
            box-shadow: 0 15px 25px rgba(0, 102, 255, 0.4);
        }

        .loading {
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 480px) {
            .login-card {
                padding: 35px 25px;
            }
            h1 {
                font-size: 1.7rem;
            }
        }

        body.dark label i {
            color: var(--secondary);
        }
        body.dark input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }
    </style>
</head>
<body>
    <div class="radial-glow-1"></div>
    <div class="radial-glow-2"></div>

    <ul class="bg-bubbles">
        <li></li><li></li><li></li><li></li><li></li><li></li>
    </ul>

    <button class="theme-toggle" id="themeToggle"><i class="fas fa-moon"></i></button>

    <div class="login-card">
        <div class="brand-header">
            <div class="brand-logo">
                <i class="fas fa-school"></i>
            </div>
            <h1>School Admin</h1>
            <p class="brand-subtitle">Institution Portal Login</p>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ 'danger' if category == 'error' else 'success' }} alert-dismissible fade show border-0 rounded-3">
                        {{ message }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST" action="{{ url_for('auth.school_admin_login') }}" id="loginForm">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
            <div class="form-group">
                <label class="form-label">Username</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-user"></i></span>
                    <input type="text" name="username" class="form-control" placeholder="Enter administrative username" required>
                </div>
            </div>
            
            <div class="form-group">
                <label class="form-label">Password</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-lock"></i></span>
                    <input type="password" name="password" class="form-control" placeholder="Enter security password" required>
                </div>
            </div>
            
            <button type="submit" class="btn btn-primary mt-2">
                <i class="fas fa-sign-in-alt"></i> Access Portal
            </button>
        </form>
        
        <div class="back-link">
            <a href="{{ url_for('dashboard.landing') }}">
                <i class="fas fa-arrow-left"></i> Back to Home
            </a>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const themeToggle = document.getElementById('themeToggle');
        const themeIcon = themeToggle.querySelector('i');
        
        const savedTheme = localStorage.getItem('theme') || (localStorage.getItem('darkMode') === 'true' ? 'dark' : 'light');
        if (savedTheme === 'dark') {
            document.body.classList.add('dark');
            document.body.classList.add('dark-mode');
            themeIcon.className = 'fas fa-sun';
        }

        themeToggle.addEventListener('click', function() {
            const isDark = document.body.classList.toggle('dark');
            document.body.classList.toggle('dark-mode', isDark);
            themeIcon.className = isDark ? 'fas fa-sun' : 'fas fa-moon';
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            localStorage.setItem('darkMode', isDark);
        });

        // Form feedback
        document.getElementById('loginForm').addEventListener('submit', function() {
            const btn = this.querySelector('.btn');
            btn.innerHTML = '<span class="loading"></span> Verifying...';
            btn.disabled = true;
        });
    </script>
</body>
</html>
