<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="csrf-token" content="{{ csrf_token() }}">
    <title>Admin Login - Noor Graphics</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Poppins:wght@300;400;500;600;700&display=swap');

        :root {
            --primary: #0066ff;
            --primary-gradient: linear-gradient(135deg, #0066ff 0%, #0052cc 100%);
            --accent: #ff4757;
            --accent-gradient: linear-gradient(135deg, #ff4757 0%, #ff3838 100%);
            --secondary: #00d2ff;
            
            --bg-light: linear-gradient(135deg, #f8faff 0%, #edf2ff 100%);
            --bg-dark: linear-gradient(135deg, #0f0f23 0%, #1a1a2e 100%);
            
            --card-light: rgba(255, 255, 255, 0.75);
            --card-dark: rgba(30, 30, 50, 0.75);
            
            --text-light: #1a1a1a;
            --text-dark: #f8f9fa;
            
            --border-light: rgba(255, 255, 255, 0.4);
            --border-dark: rgba(255, 255, 255, 0.1);
            
            --shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            --shadow-dark: 0 20px 40px rgba(0, 0, 0, 0.3);
            
            --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg-light);
            color: var(--text-light);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
            position: relative;
            transition: var(--transition);
        }

        body.dark {
            background: var(--bg-dark);
            color: var(--text-dark);
        }

        /* Radial Background Glow Orbs */
        .radial-glow-1 {
            position: absolute;
            top: -10%;
            left: -10%;
            width: 50vw;
            height: 50vw;
            background: radial-gradient(circle, rgba(0, 102, 255, 0.15) 0%, transparent 70%);
            z-index: -2;
            pointer-events: none;
            animation: pulseGlow 10s infinite alternate;
        }

        .radial-glow-2 {
            position: absolute;
            bottom: -10%;
            right: -10%;
            width: 50vw;
            height: 50vw;
            background: radial-gradient(circle, rgba(255, 71, 87, 0.1) 0%, transparent 70%);
            z-index: -2;
            pointer-events: none;
            animation: pulseGlow 12s infinite alternate-reverse;
        }

        @keyframes pulseGlow {
            0% { transform: scale(1) translate(0, 0); }
            100% { transform: scale(1.2) translate(5%, 5%); }
        }

        /* Floating particles background */
        .bg-bubbles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .bg-bubbles li {
            position: absolute;
            list-style: none;
            display: block;
            width: 40px;
            height: 40px;
            background-color: rgba(0, 102, 255, 0.08);
            bottom: -160px;
            border-radius: 50%;
            animation: floatBubbles 25s infinite linear;
        }

        .bg-bubbles li:nth-child(1) { left: 10%; width: 80px; height: 80px; }
        .bg-bubbles li:nth-child(2) { left: 20%; animation-delay: 2s; animation-duration: 17s; width: 60px; height: 60px; }
        .bg-bubbles li:nth-child(3) { left: 25%; animation-delay: 4s; width: 100px; height: 100px; }
        .bg-bubbles li:nth-child(4) { left: 40%; animation-delay: 0s; animation-duration: 22s; width: 140px; height: 140px; }
        .bg-bubbles li:nth-child(5) { left: 70%; animation-delay: 3s; width: 80px; height: 80px; }
        .bg-bubbles li:nth-child(6) { left: 80%; animation-delay: 2s; width: 110px; height: 110px; }
        .bg-bubbles li:nth-child(7) { left: 32%; animation-delay: 6s; width: 130px; height: 130px; }
        .bg-bubbles li:nth-child(8) { left: 55%; animation-delay: 8s; animation-duration: 18s; width: 40px; height: 40px; }

        body.dark .bg-bubbles li {
            background-color: rgba(255, 255, 255, 0.03);
        }

        @keyframes floatBubbles {
            0% { transform: translateY(0) rotate(0deg); opacity: 0.8; border-radius: 50%; }
            50% { border-radius: 35%; }
            100% { transform: translateY(-1200px) rotate(720deg); opacity: 0; border-radius: 50%; }
        }

        /* Glass Login Box */
        .login-card {
            background: var(--card-light);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-light);
            border-radius: 24px;
            padding: 50px 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: var(--shadow);
            transition: var(--transition);
            animation: slideUp 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            z-index: 10;
        }

        body.dark .login-card {
            background: var(--card-dark);
            border: 1px solid var(--border-dark);
            box-shadow: var(--shadow-dark);
        }

        .login-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.15);
        }

        body.dark .login-card:hover {
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4);
        }

        .login-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 6px;
            background: var(--primary-gradient);
            border-radius: 24px 24px 0 0;
        }

        .brand-header {
            text-align: center;
            margin-bottom: 35px;
        }

        .brand-logo {
            width: 70px;
            height: 70px;
            background: var(--primary-gradient);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
            box-shadow: 0 10px 20px rgba(0, 102, 255, 0.3);
            color: white;
            font-size: 2rem;
            animation: pulseLogo 3s infinite alternate;
        }

        @keyframes pulseLogo {
            0% { transform: scale(1); box-shadow: 0 10px 20px rgba(0, 102, 255, 0.3); }
            100% { transform: scale(1.05); box-shadow: 0 10px 25px rgba(0, 102, 255, 0.5); }
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 2rem;
            font-weight: 800;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .brand-subtitle {
            font-size: 0.95rem;
            opacity: 0.7;
            margin-top: 5px;
        }

        /* Form styling */
        .form-group {
            margin-bottom: 25px;
            position: relative;
        }

        label {
            display: block;
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        label i {
            color: var(--primary);
        }

        input {
            width: 100%;
            padding: 14px 18px;
            border-radius: 12px;
            border: 2px solid rgba(0, 102, 255, 0.1);
            background: rgba(255, 255, 255, 0.5);
            color: inherit;
            font-family: inherit;
            font-size: 1rem;
            transition: var(--transition);
        }

        body.dark input {
            background: rgba(0, 0, 0, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.05);
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.8);
            box-shadow: 0 0 0 4px rgba(0, 102, 255, 0.15);
            transform: translateY(-2px);
        }

        body.dark input:focus {
            background: rgba(0, 0, 0, 0.4);
            box-shadow: 0 0 0 4px rgba(0, 102, 255, 0.3);
        }

        .btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 12px;
            background: var(--primary-gradient);
            color: white;
            font-size: 1.05rem;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: 0 10px 20px rgba(0, 102, 255, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.35), transparent);
            transition: left 0.6s ease;
        }

        .btn:hover::before {
            left: 100%;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(0, 102, 255, 0.5);
            background: linear-gradient(135deg, #0052cc 0%, #0047b3 100%);
        }

        .btn:active {
            transform: translateY(-1px);
        }

        .back-link {
            text-align: center;
            margin-top: 25px;
        }

        .back-link a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: var(--transition);
        }

        .back-link a:hover {
            transform: translateX(-5px);
            opacity: 0.8;
        }

        /* Notifications & Alerts */
        .notification {
            position: fixed;
            top: 25px;
            right: 25px;
            padding: 15px 25px;
            border-radius: 12px;
            background: rgba(40, 167, 69, 0.9);
            backdrop-filter: blur(10px);
            color: white;
            box-shadow: var(--shadow);
            transform: translateX(120%);
            opacity: 0;
            transition: var(--transition);
            z-index: 1001;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .notification.show {
            transform: translateX(0);
            opacity: 1;
        }

        .notification.error {
            background: rgba(220, 53, 69, 0.9);
        }

        .loading {
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 480px) {
            .login-card {
                padding: 35px 25px;
            }
            h1 {
                font-size: 1.7rem;
            }
        }

        body.dark label i {
            color: var(--secondary);
        }
        body.dark input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        @media (prefers-color-scheme: dark) {
            body {
                background: var(--bg-dark);
                color: var(--text-dark);
            }
        }
    </style>
</head>
<body>
    <div class="radial-glow-1"></div>
    <div class="radial-glow-2"></div>

    <ul class="bg-bubbles">
        <li></li><li></li><li></li><li></li><li></li><li></li><li></li><li></li>
    </ul>

    <div class="notification" id="notification">
        <i class="fas fa-check-circle"></i>
        <span id="notification-text">Successfully processed</span>
    </div>

    <div class="login-card">
        <div class="brand-header">
            <div class="brand-logo">
                <i class="fas fa-shield-alt"></i>
            </div>
            <h1>Admin Panel</h1>
            <p class="brand-subtitle">Noor Graphics ID Generator</p>
        </div>

        <form action="/login" method="post" id="loginForm">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
            <div class="form-group">
                <label><i class="fas fa-user"></i> Username</label>
                <input type="text" name="username" required placeholder="Enter admin username">
            </div>
            <div class="form-group">
                <label><i class="fas fa-key"></i> Password</label>
                <input type="password" name="password" required placeholder="Enter admin password">
            </div>
            <button type="submit" class="btn"><i class="fas fa-sign-in-alt"></i> Access Dashboard</button>
        </form>

        <div class="back-link">
            <a href="{{ url_for('dashboard.landing') }}">
                <i class="fas fa-arrow-left"></i> Back to Home
            </a>
        </div>
    </div>

    <script>
        // Auto dark mode based on device preference
        (function() {
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            if (prefersDark) { document.body.classList.add('dark'); }
        })();
        // Form feedback
        document.getElementById('loginForm').addEventListener('submit', function() {
            const btn = this.querySelector('.btn');
            btn.innerHTML = '<span class="loading"></span> Authenticating...';
            btn.disabled = true;
        });
    </script>
</body>
</html>
