<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="csrf-token" content="{{ csrf_token() }}">
    <title>Set New Password - ID Card Generator</title>
    <link rel="icon" href="data:,">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Poppins:wght@300;400;500;600;700&display=swap');

        :root {
            --primary: #0066ff;
            --primary-gradient: linear-gradient(135deg, #0066ff 0%, #0052cc 100%);
            --accent: #ff4757;
            --accent-gradient: linear-gradient(135deg, #ff4757 0%, #ff3838 100%);
            --secondary: #00d2ff;
            
            --bg-light: linear-gradient(135deg, #f8faff 0%, #edf2ff 100%);
            --bg-dark: linear-gradient(135deg, #0f0f23 0%, #1a1a2e 100%);
            
            --card-light: rgba(255, 255, 255, 0.75);
            --card-dark: rgba(30, 30, 50, 0.75);
            
            --text-light: #1a1a1a;
            --text-dark: #f8f9fa;
            
            --border-light: rgba(255, 255, 255, 0.4);
            --border-dark: rgba(255, 255, 255, 0.1);
            
            --shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            --shadow-dark: 0 20px 40px rgba(0, 0, 0, 0.3);
            
            --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg-light);
            color: var(--text-light);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow: hidden;
            position: relative;
            transition: var(--transition);
        }

        body.dark {
            background: var(--bg-dark);
            color: var(--text-dark);
        }

        /* Background Glow Orbs */
        .radial-glow-1 {
            position: absolute;
            top: -10%;
            left: -10%;
            width: 50vw;
            height: 50vw;
            background: radial-gradient(circle, rgba(0, 102, 255, 0.15) 0%, transparent 70%);
            z-index: -2;
            pointer-events: none;
            animation: pulseGlow 10s infinite alternate;
        }

        .radial-glow-2 {
            position: absolute;
            bottom: -10%;
            right: -10%;
            width: 50vw;
            height: 50vw;
            background: radial-gradient(circle, rgba(255, 71, 87, 0.1) 0%, transparent 70%);
            z-index: -2;
            pointer-events: none;
            animation: pulseGlow 12s infinite alternate-reverse;
        }

        @keyframes pulseGlow {
            0% { transform: scale(1); }
            100% { transform: scale(1.1); }
        }

        /* Floating bubbles */
        .bg-bubbles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .bg-bubbles li {
            position: absolute;
            list-style: none;
            display: block;
            width: 40px;
            height: 40px;
            background-color: rgba(0, 102, 255, 0.08);
            bottom: -160px;
            border-radius: 50%;
            animation: floatBubbles 25s infinite linear;
        }

        .bg-bubbles li:nth-child(1) { left: 10%; width: 80px; height: 80px; }
        .bg-bubbles li:nth-child(2) { left: 20%; animation-delay: 2s; animation-duration: 17s; width: 60px; height: 60px; }
        .bg-bubbles li:nth-child(3) { left: 55%; animation-delay: 8s; animation-duration: 18s; width: 40px; height: 40px; }

        body.dark .bg-bubbles li {
            background-color: rgba(255, 255, 255, 0.03);
        }

        @keyframes floatBubbles {
            0% { transform: translateY(0) rotate(0deg); opacity: 0.8; }
            100% { transform: translateY(-1200px) rotate(720deg); opacity: 0; }
        }

        /* Glass Card */
        .login-card {
            background: var(--card-light);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-light);
            border-radius: 24px;
            padding: 45px 35px;
            width: 100%;
            max-width: 420px;
            box-shadow: var(--shadow);
            transition: var(--transition);
            animation: slideUp 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            z-index: 10;
        }

        body.dark .login-card {
            background: var(--card-dark);
            border: 1px solid var(--border-dark);
            box-shadow: var(--shadow-dark);
        }

        .login-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.15);
        }

        .login-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 6px;
            background: var(--primary-gradient);
            border-radius: 24px 24px 0 0;
        }

        .brand-header {
            text-align: center;
            margin-bottom: 25px;
        }

        .brand-logo {
            width: 70px;
            height: 70px;
            background: var(--primary-gradient);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
            box-shadow: 0 10px 20px rgba(0, 102, 255, 0.2);
            color: white;
            font-size: 2rem;
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 1.8rem;
            font-weight: 800;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .brand-subtitle {
            font-size: 0.95rem;
            opacity: 0.7;
            margin-top: 5px;
        }

        /* Form styling */
        .form-group {
            margin-bottom: 20px;
            position: relative;
        }

        label {
            display: block;
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        label i {
            color: var(--primary);
        }

        .input-group {
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid rgba(0, 102, 255, 0.1);
            background: rgba(255, 255, 255, 0.5);
            transition: var(--transition);
        }

        body.dark .input-group {
            background: rgba(0, 0, 0, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.05);
        }

        .input-group-text {
            background: transparent;
            border: none;
            color: var(--primary);
            font-size: 1rem;
            padding-left: 15px;
        }

        .form-control {
            border: none;
            background: transparent;
            color: inherit;
            padding: 13px 15px;
            font-family: inherit;
        }

        .form-control:focus {
            background: transparent;
            box-shadow: none;
            color: inherit;
        }

        .input-group:focus-within {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(0, 102, 255, 0.15);
            transform: translateY(-2px);
        }

        /* Buttons */
        .btn-primary {
            background: var(--primary-gradient);
            border: none;
            border-radius: 12px;
            padding: 13px;
            font-weight: 600;
            font-family: 'Outfit', sans-serif;
            letter-spacing: 0.5px;
            box-shadow: 0 8px 16px rgba(0, 102, 255, 0.2);
            transition: var(--transition);
            width: 100%;
        }

        .btn-primary:hover {
            background: linear-gradient(135deg, #0052cc 0%, #003d99 100%);
            box-shadow: 0 10px 20px rgba(0, 102, 255, 0.3);
            transform: translateY(-2px);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        /* Animations */
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Theme toggle button styling */
        .theme-toggle-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: var(--card-light);
            border: 1px solid var(--border-light);
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: var(--shadow);
            color: var(--primary);
            transition: var(--transition);
            z-index: 100;
        }

        body.dark .theme-toggle-btn {
            background: var(--card-dark);
            border: 1px solid var(--border-dark);
            color: var(--secondary);
            box-shadow: var(--shadow-dark);
        }

        .theme-toggle-btn:hover {
            transform: scale(1.1) rotate(15deg);
        }

        @media (max-width: 480px) {
            .login-card {
                padding: 35px 25px;
            }
            h1 {
                font-size: 1.7rem;
            }
        }

        body.dark label i {
            color: var(--secondary);
        }
        body.dark .input-group-text {
            color: var(--secondary);
        }
        body.dark input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }
        body.dark .alert-success {
            color: #2ecc71;
            background: rgba(46, 204, 113, 0.15);
            border-color: rgba(46, 204, 113, 0.3);
        }
        body.dark .alert-error {
            color: #ff6b6b;
            background: rgba(231, 76, 60, 0.15);
            border-color: rgba(231, 76, 60, 0.3);
        }
    </style>
</head>
<body>

    <button class="theme-toggle-btn" id="themeToggleBtn">
        <i class="fas fa-moon" id="themeIcon"></i>
    </button>

    <div class="radial-glow-1"></div>
    <div class="radial-glow-2"></div>

    <ul class="bg-bubbles">
        <li></li><li></li><li></li>
    </ul>

    <div class="login-card">
        <div class="brand-header">
            <div class="brand-logo">
                <i class="fas fa-key"></i>
            </div>
            <h1>Set New Password</h1>
            <p class="brand-subtitle">Reset your student account credentials</p>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ 'danger' if category == 'error' else 'success' }} alert-dismissible fade show" role="alert">
                        {{ message }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>

            <div class="form-group">
                <label for="password"><i class="fas fa-lock"></i> New Password</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-lock"></i></span>
                    <input type="password" class="form-control" id="password" name="password" required minlength="6" placeholder="Enter new password">
                </div>
            </div>

            <div class="form-group">
                <label for="confirm_password"><i class="fas fa-check-double"></i> Confirm Password</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-check-double"></i></span>
                    <input type="password" class="form-control" id="confirm_password" name="confirm_password" required minlength="6" placeholder="Confirm new password">
                </div>
            </div>

            <button type="submit" class="btn btn-primary mt-2">
                <i class="fas fa-save"></i> Change Password
            </button>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const themeToggleBtn = document.getElementById('themeToggleBtn');
        const themeIcon = document.getElementById('themeIcon');
        
        // Load preference
        const savedTheme = localStorage.getItem('theme') || (localStorage.getItem('darkMode') === 'true' ? 'dark' : 'light');
        if (savedTheme === 'dark') {
            document.body.classList.add('dark');
            document.body.classList.add('dark-mode');
            themeIcon.className = 'fas fa-sun';
        }

        themeToggleBtn.addEventListener('click', () => {
            const isDark = document.body.classList.toggle('dark');
            document.body.classList.toggle('dark-mode', isDark);
            themeIcon.className = isDark ? 'fas fa-sun' : 'fas fa-moon';
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            localStorage.setItem('darkMode', isDark);
        });
    </script>
</body>
</html>
