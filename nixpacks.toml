# nixpacks.toml
# Railway build config for Flask, MediaPipe, Cloudinary, and Redis/RQ.

[phases.setup]
# Python/build tools plus native libraries required by MediaPipe and image processing.
nixPkgs = ["python311", "gcc", "gnumake"]
aptPkgs = [
  "libgl1",
  "libglib2.0-0",
  "libsm6",
  "libxext6",
  "libxrender1",
  "libgomp1"
]

[phases.install]
cmds = [
  "python -m venv /opt/venv",
  ". /opt/venv/bin/activate",
  "pip install --upgrade pip",
  "pip install -r requirements.txt"
]

[start]
cmd = ". /opt/venv/bin/activate && gunicorn --workers=1 --threads=4 --timeout 120 --bind 0.0.0.0:$PORT app:app"
